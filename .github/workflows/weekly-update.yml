name: Weekly Signatory Update

on:
  schedule:
    - cron: '0 7 * * 1'   # Chaque lundi à 7h UTC
  workflow_dispatch:        # Déclenchement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update.py

      - name: Commit & Push if changed
        run: |
          git config user.name "jura39bot"
          git config user.email "jura39bot@gmail.com"
          git add data/bottles.json
          git diff --staged --quiet || git commit -m "🥃 Màj hebdo Signatory Islay — $(date +%Y-%m-%d)"
          git push
